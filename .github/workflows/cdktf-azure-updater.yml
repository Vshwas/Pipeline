name: CDKTF Azure Module Updater — Claude Code Demo

on:
  workflow_dispatch:
    inputs:
      module_path:
        description: 'Path to the module inside this repo (e.g. demo/17_Azure_ACR)'
        required: true
        default: 'demo/17_Azure_ACR'
      provider_version:
        description: 'Target azurerm provider version (leave empty to fetch latest from Terraform Registry)'
        required: false
        default: ''
      release_tag:
        description: 'Git tag for this release (e.g. v1, v2, v3 — leave empty to skip tagging)'
        required: false
        default: ''

jobs:
  update-module:
    name: Update CDKTF Module with Claude Code
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Install CDKTF CLI
        run: npm install -g cdktf-cli@0.20.12 typescript ts-node

      - name: Install module dependencies and generate provider bindings
        working-directory: ${{ github.event.inputs.module_path }}
        run: |
          npm install
          cdktf get
        continue-on-error: true

      - name: Run Claude Code — Update CDKTF Module
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,mcp__terraform__get_latest_provider_version,mcp__terraform__get_provider_details,mcp__terraform__get_provider_capabilities"
          mcp_config: |
            {
              "mcpServers": {
                "terraform": {
                  "command": "npx",
                  "args": ["-y", "@hashicorp/mcp-terraform-registry@latest"],
                  "env": {}
                }
              }
            }
          direct_prompt: |
            You are updating the CDKTF Azure module at: ${{ github.event.inputs.module_path }}

            STEP 0 — Determine provider version
            The user-specified version is: "${{ github.event.inputs.provider_version }}"

            - If the user provided a version (non-empty), use that exact version.
            - If empty, use the Terraform MCP tool `mcp__terraform__get_latest_provider_version`
              with namespace="hashicorp" and type="azurerm" to fetch the latest version
              from the Terraform Registry. Use that fetched version for all steps below.

            Print the version you will use before proceeding.

            STEP 1 — Update cdktf.json
            In ${{ github.event.inputs.module_path }}/cdktf.json, set:
              "terraformProviders": ["registry.terraform.io/hashicorp/azurerm@<version>"]

            STEP 2 — Use Terraform MCP to check provider details
            Call `mcp__terraform__get_provider_details` with namespace="hashicorp", type="azurerm",
            and the chosen version to understand what changed in this version.
            Use this information to identify any additional deprecated arguments in the module.

            STEP 3 — Fix main.ts imports
            In ${{ github.event.inputs.module_path }}/main.ts:
            - Change any import from "@cdktf/provider-azurerm" to use sub-paths under "./.gen/providers/azurerm/"
              For example:
                AzurermProvider  → import from "./.gen/providers/azurerm/provider"
                ContainerRegistry → import from "./.gen/providers/azurerm/container-registry"
            - The cdktf and constructs imports stay unchanged.

            STEP 4 — Fix deprecated arguments
            In ${{ github.event.inputs.module_path }}/main.ts:
            - Replace  retentionPolicy:[{ days: X, enabled: Y }]  with  retentionPolicyInDays: X
            - Remove the Retention_Policy_Enabled TerraformVariable declaration AND its usage (no longer supported)
            - Keep  features: {}  as an object — do NOT change it to an array [{}]
            - Remove publicNetworkAccessEnabled from ContainerRegistry AND remove its TerraformVariable declaration (Public_Network_Access_Enabled) — this property does not exist in azurerm 4.x ContainerRegistryConfig
            - Remove zoneRedundancyEnabled from ContainerRegistry AND remove its TerraformVariable declaration (Zone_Redundancy_Enabled) — this property does not exist in azurerm 4.x ContainerRegistryConfig
            - IMPORTANT: For every property you remove from a resource block, also remove its corresponding TerraformVariable declaration if that variable is no longer used anywhere in the file.
            - Read the generated types file at ./.gen/providers/azurerm/container-registry/index.ts to get the exact list of valid properties for ContainerRegistryConfig, and ensure main.ts only uses properties that exist there.

            STEP 5 — Fix tsconfig.json
            In ${{ github.event.inputs.module_path }}/tsconfig.json:
            - Remove the line with "charset": "utf8"

            STEP 6 — Show a clear summary
            Print a summary showing:
            - Provider version used (and whether it was user-provided or fetched from registry)
            - What files were changed
            - What specific changes were made in each file
            - Whether cdktf synth passed or failed and why

      - name: Run cdktf synth to generate cdk.tf.json
        working-directory: ${{ github.event.inputs.module_path }}
        run: |
          echo "==> Running cdktf synth..."
          cdktf synth

          echo "==> Verifying cdk.tf.json..."
          CDK_JSON=$(find cdktf.out/stacks -name "cdk.tf.json" | head -1)
          if [ -z "$CDK_JSON" ]; then
            echo "ERROR: cdk.tf.json not found!"
            exit 1
          fi
          echo "cdk.tf.json found at: $CDK_JSON"
          python3 -m json.tool "$CDK_JSON" > /dev/null && echo "Valid JSON confirmed."

      - name: Generate variables.tf and var.tfvars from cdk.tf.json
        working-directory: ${{ github.event.inputs.module_path }}
        run: |
          CDK_JSON=$(find cdktf.out/stacks -name "cdk.tf.json" | head -1)
          echo "==> Generating variables.tf from $CDK_JSON..."
          python3 $GITHUB_WORKSPACE/scripts/generate_variables_tf.py "$CDK_JSON"
          echo "==> variables.tf contents:"
          cat variables.tf

          echo "==> Generating var.tfvars with sample values..."
          python3 $GITHUB_WORKSPACE/scripts/generate_tfvars.py "$CDK_JSON"
          echo "==> var.tfvars contents:"
          cat var.tfvars

      - name: Terraform init and plan (validate without backend)
        working-directory: ${{ github.event.inputs.module_path }}
        run: |
          CDK_OUT=$(find cdktf.out/stacks -name "cdk.tf.json" -exec dirname {} \; | head -1)
          echo "==> Running terraform init (no backend) in $CDK_OUT..."
          terraform -chdir="$CDK_OUT" init -backend=false

          echo "==> Running terraform plan..."
          terraform -chdir="$CDK_OUT" plan \
            -var-file="$GITHUB_WORKSPACE/${{ github.event.inputs.module_path }}/var.tfvars" \
            -input=false \
            -no-color \
            || echo "::warning::terraform plan completed with warnings — review above output"

      - name: Final cdktf synth with backend restored
        working-directory: ${{ github.event.inputs.module_path }}
        run: |
          echo "==> Running final cdktf synth (with backend)..."
          cdktf synth
          echo "==> Final cdk.tf.json generated successfully."

      - name: Show git diff
        run: git diff

      - name: Commit and push changes
        id: commit
        run: |
          VERSION="${{ github.event.inputs.provider_version }}"
          if [ -z "$VERSION" ]; then VERSION="latest"; fi
          BRANCH="claude/cdktf-update-${VERSION}-$(date +%Y%m%d%H%M%S)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git config user.name "Claude Code Bot"
          git config user.email "claude-code-bot@github-actions"
          git checkout -b $BRANCH
          git add ${{ github.event.inputs.module_path }}/
          git diff --cached --quiet || git commit -m "chore: upgrade ${{ github.event.inputs.module_path }} to azurerm ${VERSION} via Claude Code"
          git push origin $BRANCH

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = '${{ github.event.inputs.provider_version }}' || 'latest';
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: upgrade ${{ github.event.inputs.module_path }} to azurerm ${version}`,
              body: `## Automated CDKTF Module Update\n\n**Module:** \`${{ github.event.inputs.module_path }}\`\n**Provider version:** azurerm \`${version}\`\n**Version source:** ${version === 'latest' ? 'Fetched automatically from Terraform Registry via MCP' : 'User specified'}\n\n### Changes made by Claude Code\n- Updated \`cdktf.json\` provider version\n- Fixed \`main.ts\` imports to use \`.gen/\` sub-paths\n- Fixed deprecated arguments based on Terraform Registry provider details\n- Removed deprecated \`charset\` from \`tsconfig.json\`\n- Ran \`cdktf synth\` to validate the generated \`cdk.tf.json\`\n\n> Generated automatically by [Claude Code](https://claude.ai/code) using Terraform Registry MCP`,
              head: '${{ steps.commit.outputs.branch }}',
              base: 'master'
            });
            console.log('PR created: ' + pr.html_url);

      - name: Create release tag
        if: ${{ github.event.inputs.release_tag != '' }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          VERSION="${{ github.event.inputs.provider_version }}"
          if [ -z "$VERSION" ]; then VERSION="latest"; fi

          git config user.name "Claude Code Bot"
          git config user.email "claude-code-bot@github-actions"

          # Delete tag if it already exists (allows re-tagging)
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create annotated tag on master
          git tag -a "$TAG" -m "Release $TAG — azurerm $VERSION (${{ github.event.inputs.module_path }})"
          git push origin "$TAG"

          echo "Tag $TAG created and pushed."
