name: CDKTF Azure Module Updater — Claude Code Demo

on:
  workflow_dispatch:
    inputs:
      module_path:
        description: 'Path to the module inside this repo (e.g. demo/17_Azure_ACR)'
        required: true
        default: 'demo/17_Azure_ACR'
      provider_version:
        description: 'Target azurerm provider version (leave empty to fetch latest from Terraform Registry)'
        required: false
        default: ''

jobs:
  update-module:
    name: Update CDKTF Module with Claude Code
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install CDKTF CLI
        run: npm install -g cdktf-cli@0.20.12 typescript ts-node

      - name: Install module dependencies and generate provider bindings
        working-directory: ${{ github.event.inputs.module_path }}
        run: |
          npm install
          cdktf get
        continue-on-error: true

      - name: Run Claude Code — Update CDKTF Module
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,mcp__terraform__get_latest_provider_version,mcp__terraform__get_provider_details,mcp__terraform__get_provider_capabilities"
          mcp_config: |
            {
              "mcpServers": {
                "terraform": {
                  "command": "npx",
                  "args": ["-y", "@hashicorp/mcp-terraform-registry@latest"],
                  "env": {}
                }
              }
            }
          direct_prompt: |
            You are updating the CDKTF Azure module at: ${{ github.event.inputs.module_path }}

            STEP 0 — Determine provider version
            The user-specified version is: "${{ github.event.inputs.provider_version }}"

            - If the user provided a version (non-empty), use that exact version.
            - If empty, use the Terraform MCP tool `mcp__terraform__get_latest_provider_version`
              with namespace="hashicorp" and type="azurerm" to fetch the latest version
              from the Terraform Registry. Use that fetched version for all steps below.

            Print the version you will use before proceeding.

            STEP 1 — Update cdktf.json
            In ${{ github.event.inputs.module_path }}/cdktf.json, set:
              "terraformProviders": ["registry.terraform.io/hashicorp/azurerm@<version>"]

            STEP 2 — Use Terraform MCP to check provider details
            Call `mcp__terraform__get_provider_details` with namespace="hashicorp", type="azurerm",
            and the chosen version to understand what changed in this version.
            Use this information to identify any additional deprecated arguments in the module.

            STEP 3 — Fix main.ts imports
            In ${{ github.event.inputs.module_path }}/main.ts:
            - Change any import from "@cdktf/provider-azurerm" to use sub-paths under "./.gen/providers/azurerm/"
              For example:
                AzurermProvider  → import from "./.gen/providers/azurerm/provider"
                ContainerRegistry → import from "./.gen/providers/azurerm/container-registry"
            - The cdktf and constructs imports stay unchanged.

            STEP 4 — Fix deprecated arguments
            In ${{ github.event.inputs.module_path }}/main.ts:
            - Replace  retentionPolicy:[{ days: X, enabled: Y }]  with  retentionPolicyInDays: X
            - Remove the Retention_Policy_Enabled TerraformVariable declaration (no longer supported)
            - Replace  features: { }  with  features: [{}]
            - Fix any other deprecated arguments identified from the provider details in STEP 2.

            STEP 5 — Fix tsconfig.json
            In ${{ github.event.inputs.module_path }}/tsconfig.json:
            - Remove the line with "charset": "utf8"

            STEP 6 — Run cdktf synth to validate
            Run the following commands inside ${{ github.event.inputs.module_path }}:

            a) Comment out the backend section in main.ts (AzurermBackend block and
               Backend_* TerraformVariable declarations) so cdktf synth works without credentials.

            b) Run: cd ${{ github.event.inputs.module_path }} && cdktf synth

            c) If synth fails, read the error, fix main.ts, and re-run until it passes.

            d) Once synth passes, uncomment the backend section back in main.ts.

            e) Run cdktf synth one final time to generate the final cdk.tf.json with backend.

            f) Verify the generated cdk.tf.json has:
               - Correct provider version
               - Backend config present
               - No placeholder values

            STEP 7 — Show a clear summary
            Print a summary showing:
            - Provider version used (and whether it was user-provided or fetched from registry)
            - What files were changed
            - What specific changes were made in each file
            - Whether cdktf synth passed or failed and why

      - name: Show git diff
        run: git diff

      - name: Commit and push changes
        id: commit
        run: |
          VERSION="${{ github.event.inputs.provider_version }}"
          if [ -z "$VERSION" ]; then VERSION="latest"; fi
          BRANCH="claude/cdktf-update-${VERSION}-$(date +%Y%m%d%H%M%S)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git config user.name "Claude Code Bot"
          git config user.email "claude-code-bot@github-actions"
          git checkout -b $BRANCH
          git add ${{ github.event.inputs.module_path }}/
          git diff --cached --quiet || git commit -m "chore: upgrade ${{ github.event.inputs.module_path }} to azurerm ${VERSION} via Claude Code"
          git push origin $BRANCH

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = '${{ github.event.inputs.provider_version }}' || 'latest';
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: upgrade ${{ github.event.inputs.module_path }} to azurerm ${version}`,
              body: `## Automated CDKTF Module Update\n\n**Module:** \`${{ github.event.inputs.module_path }}\`\n**Provider version:** azurerm \`${version}\`\n**Version source:** ${version === 'latest' ? 'Fetched automatically from Terraform Registry via MCP' : 'User specified'}\n\n### Changes made by Claude Code\n- Updated \`cdktf.json\` provider version\n- Fixed \`main.ts\` imports to use \`.gen/\` sub-paths\n- Fixed deprecated arguments based on Terraform Registry provider details\n- Removed deprecated \`charset\` from \`tsconfig.json\`\n- Ran \`cdktf synth\` to validate the generated \`cdk.tf.json\`\n\n> Generated automatically by [Claude Code](https://claude.ai/code) using Terraform Registry MCP`,
              head: '${{ steps.commit.outputs.branch }}',
              base: 'master'
            });
            console.log('PR created: ' + pr.html_url);
